<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Outfit:wght@300;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- White Flash Overlay -->
    <div id="flash-overlay"></div>
    
    <div class="animated-bg" id="main-bg"></div>
    <div class="floating-shapes" id="shapes-container"></div>
    
    <canvas id="confetti"></canvas>
    
    <main class="container" id="main-container">
        <!-- Entry Screen -->
        <div id="entry-screen" class="glass-card fade-in tiltable">
            <div class="card-content">
                <h1 class="celebrate-title">Let's Celebrate! 🎂</h1>
                <p>Who is the birthday star today?</p>
                <form id="name-form">
                    <div class="input-group">
                        <input type="text" id="name-input" placeholder="Enter name..." required autocomplete="off">
                        <div class="input-glow"></div>
                    </div>
                    <button type="submit" class="primary-btn glow-on-hover">
                        <span>Send Wishes</span>
                        <span class="btn-icon">💌</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Surprise Screen -->
        <div id="dark-screen" class="hidden">
            <div id="typing-text" class="handwritten-text"></div>
            
            <div id="candle-container" class="hidden">
                <div class="candle">
                    <div class="flame" id="flame"></div>
                    <div class="wick"></div>
                    <div class="wax">
                        <div class="drop"></div>
                        <div class="drop"></div>
                    </div>
                </div>
            </div>
            <div id="blow-instruction" class="handwritten-text hidden" style="font-size: 2.5rem; margin-top: 40px;">(Blow into your microphone or tap the candle)</div>
        </div>

        <!-- Wish Screen -->
        <div id="wish-screen" class="glass-card hidden tiltable">
            <div class="wish-content card-content">
                <div class="cake-container">
                    <div class="cake">🎉</div>
                    <div class="sparkles">✨</div>
                </div>
                
                <h2 id="bday-name" class="festive-text"></h2>
                
                <p class="wish-message">May your birthday be as incredibly special as you are! Wishing you love, laughter, and a wonderful year ahead.</p>
                
                <button id="reset-btn" class="secondary-btn glow-on-hover">
                    <span>Send Another</span>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
